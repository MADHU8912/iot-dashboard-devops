<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Sensor Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>IoT Sensor Dashboard</h1>
    <p>Live demo dashboard for DevOps project</p>

    <div class="card-grid">
      <div class="card"><h2>Device</h2><p id="device">Loading...</p></div>
      <div class="card"><h2>Temperature</h2><p id="temperature">--</p></div>
      <div class="card"><h2>Humidity</h2><p id="humidity">--</p></div>
      <div class="card"><h2>Pressure</h2><p id="pressure">--</p></div>
      <div class="card"><h2>Light</h2><p id="light">--</p></div>
      <div class="card"><h2>Updated</h2><p id="updatedAt">--</p></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
