<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>IoT Sensor Dashboard</h1>
    <div class="grid">
      <div class="card"><h3>Device</h3><p id="device">Loading...</p></div>
      <div class="card"><h3>Temperature</h3><p id="temperature">--</p></div>
      <div class="card"><h3>Humidity</h3><p id="humidity">--</p></div>
      <div class="card"><h3>Pressure</h3><p id="pressure">--</p></div>
      <div class="card"><h3>Status</h3><p id="status">--</p></div>
      <div class="card"><h3>Updated</h3><p id="updatedAt">--</p></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
